<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tham Gia Phòng Thi - Online Quiz</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/join-room.css}" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__inner">
        <a th:href="@{/index}" class="app-logo">
          <span class="app-logo__mark">Q</span>
          <span>Quiz</span>
        </a>
        <nav class="app-nav">
          <a th:href="@{/index}">Trang chủ</a>
          <a th:href="@{/quiz}">Danh sách bài thi</a>
        </nav>
      </div>
    </header>

    <main class="app-main auth-layout">
      <section class="auth-card join-container">
        <h1 class="auth-title">Tham gia bằng mã PIN</h1>
        <p class="auth-copy">
          Nhập mã phòng do giáo viên cung cấp để vào bài thi nhanh mà không cần
          tìm trong danh sách.
        </p>

        <form id="joinForm" class="form-stack">
          <input
            type="text"
            id="roomPin"
            class="pin-input"
            placeholder="123456"
            maxlength="8"
            required
            autocomplete="off"
          />
          <button type="submit" class="btn btn-success btn-block">
            Vào phòng
          </button>
        </form>
      </section>
    </main>

    <script>
      document
        .getElementById("joinForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const pin = document.getElementById("roomPin").value.trim();

          try {
            const response = await fetch(`/api/quiz/join?pin=${pin}`, {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
              },
            });

            if (!response.ok) {
              alert("Mã phòng không hợp lệ hoặc bài thi đã đóng!");
              return;
            }

            const quiz = await response.json();
            window.location.href = `/quiz/start/${quiz.quizId}`;
          } catch (error) {
            console.error(error);
            alert("Lỗi kết nối đến máy chủ!");
          }
        });
    </script>
  </body>
</html>
