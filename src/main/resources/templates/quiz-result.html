<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kết Quả Thi - Online Quiz</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/quiz-result.css}" />
    <style>
      .result-shell {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
      }

      .result-card {
        background: linear-gradient(180deg, #1f2638 0%, #171d2b 100%);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      .result-title {
        color: #f8fafc;
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 10px;
        text-align: center;
      }

      .result-subtitle {
        color: #cbd5e1;
        text-align: center;
        margin-bottom: 28px;
        font-size: 1rem;
      }

      .score-circle {
        width: 170px;
        height: 170px;
        border-radius: 50%;
        margin: 0 auto 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: #ffffff;
        font-size: 2.7rem;
        font-weight: 800;
        box-shadow: 0 14px 32px rgba(16, 185, 129, 0.35);
      }

      .score-circle.fail {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        box-shadow: 0 14px 32px rgba(239, 68, 68, 0.3);
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .result-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 14px;
        padding: 18px;
      }

      .result-label {
        color: #93a4bd;
        font-size: 0.92rem;
        margin-bottom: 8px;
      }

      .result-value {
        color: #f8fafc;
        font-size: 1.08rem;
        font-weight: 700;
        word-break: break-word;
      }

      .result-message {
        text-align: center;
        font-size: 1.08rem;
        font-weight: 700;
        margin: 8px 0 28px;
      }

      .result-message.pass {
        color: #34d399;
      }

      .result-message.fail {
        color: #f87171;
      }

      .result-actions {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .result-actions .btn {
        text-decoration: none;
      }

      @media (max-width: 640px) {
        .result-card {
          padding: 24px 18px;
        }

        .result-grid {
          grid-template-columns: 1fr;
        }

        .score-circle {
          width: 148px;
          height: 148px;
          font-size: 2.3rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 2rem">
        <div style="display: flex; justify-content: space-between; align-items: center">
          <h1 style="color: var(--accent-primary); margin: 0">Quiz</h1>
          <nav style="display: flex; gap: 1.5rem">
            <a th:href="@{/index}">Trang chủ</a>
            <a th:href="@{/quiz}">Danh sách bài thi</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="result-shell">
      <section class="result-card">
        <h2 class="result-title">Hoàn Thành Bài Thi</h2>
        <p class="result-subtitle">Kết quả của bạn đã được ghi nhận thành công.</p>

        <div
          class="score-circle"
          th:classappend="${result.score != null and result.score < 5} ? ' fail' : ''"
          th:text="${result.score != null ? #numbers.formatDecimal(result.score, 1, 0) : '0'}"
        >
          0
        </div>

        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">Tên bài thi</div>
            <div class="result-value" th:text="${result.quiz != null ? result.quiz.title : 'Không có dữ liệu'}">
              Lập trình Java Cơ Bản
            </div>
          </div>

          <div class="result-item">
            <div class="result-label">Điểm số</div>
            <div
              class="result-value"
              th:text="${result.score != null ? #numbers.formatDecimal(result.score, 1, 0) + ' điểm' : 'Chưa có dữ liệu'}"
            >
              8 điểm
            </div>
          </div>

          <div class="result-item">
            <div class="result-label">Số câu đúng</div>
            <div
              class="result-value"
              th:text="${(result.totalCorrect != null ? result.totalCorrect : 0) + '/' + (result.totalQuestions != null ? result.totalQuestions : 0)}"
            >
              8/10
            </div>
          </div>

          <div class="result-item">
            <div class="result-label">Thời điểm nộp bài</div>
            <div
              class="result-value"
              th:text="${result.completedAt != null ? #temporals.format(result.completedAt, 'dd-MM-yyyy HH:mm:ss') : 'Chưa có dữ liệu'}"
            >
              28-03-2026 06:20:00
            </div>
          </div>
        </div>

        <p
          class="result-message"
          th:classappend="${result.score != null and result.score < 5} ? ' fail' : ' pass'"
          th:text="${result.score != null and result.score < 5} ? 'Cần ôn tập thêm để cải thiện kết quả.' : 'Làm tốt lắm, bạn đã hoàn thành bài thi.'"
        >
          Làm tốt lắm, bạn đã hoàn thành bài thi.
        </p>

        <div class="result-actions">
          <a th:href="@{/quiz}" class="btn btn-primary">Quay lại danh sách</a>
          <a th:href="@{/history}" class="btn btn-outline-secondary">Xem lịch sử</a>
        </div>
      </section>
    </main>
  </body>
</html>
