<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Kết quả bài làm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/quiz-result.css}" />
  </head>
  <body>
    <header class="bg-primary text-white py-3">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <h1 class="h4 mb-0">Hệ Thống Trắc Nghiệm Trực Tuyến</h1>
          <nav>
            <a th:href="@{/quizzes}" class="text-white text-decoration-none me-3">Danh sách bài thi</a>
            <a href="#" id="logoutBtn" class="text-white text-decoration-none" data-auth="logout">Đăng xuất</a>
          </nav>
        </div>
      </div>
    </header>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6 text-center">
          <div class="card shadow">
            <div class="card-header bg-success text-white">
              <h3>Hoàn thành bài thi!</h3>
            </div>
            <div class="card-body">
              <h4 class="mb-3">Kết quả của bạn</h4>

              <h1 class="display-1 text-primary mb-4">
                <span th:text="${result.correctAnswers}">8</span>/<span
                  th:text="${result.totalQuestions}"
                  >10</span
                >
              </h1>

              <p class="fs-5">
                Điểm số:
                <strong th:text="${result.score} + ' điểm'">80 điểm</strong>
              </p>
              <p class="text-muted">
                Thời gian nộp bài:
                <span
                  th:text="${#temporals.format(result.submitTime, 'dd-MM-yyyy HH:mm:ss')}"
                ></span>
              </p>

              <div class="mt-4">
                <a th:href="@{/quizzes}" class="btn btn-primary"
                  >Làm bài khác</a
                >
                <a th:href="@{/history}" class="btn btn-outline-secondary"
                  >Xem lịch sử</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
