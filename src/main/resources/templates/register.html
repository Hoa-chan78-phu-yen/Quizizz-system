<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - Online Quiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/register.css}" />
  </head>
  <body>
    <header class="bg-primary text-white py-3">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <h1 class="h4 mb-0">Hệ Thống Trắc Nghiệm Trực Tuyến</h1>
          <nav>
            <a th:href="@{/}" class="text-white text-decoration-none"
              >Trang chủ</a
            >
          </nav>
        </div>
      </div>
    </header>

    <div class="container my-5">
      <div class="form-container">
        <h2>Tạo Tài Khoản Mới</h2>

        <div id="message" class="d-none"></div>

        <form id="registerForm">
          <div class="form-group">
            <label for="username">Họ và tên</label>
            <input
              type="text"
              class="form-control"
              id="username"
              placeholder="Nhập họ và tên..."
              required
            />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="Nhập email..."
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Tạo mật khẩu..."
              required
            />
          </div>
          <button type="submit" class="btn btn-primary mt-2">Đăng Ký</button>
        </form>

        <p class="text-center mt-3">
          Đã có tài khoản?
          <a th:href="@{/login}" class="text-decoration-none">Đăng nhập</a>
        </p>
      </div>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          if (!username || !email || !password) {
            showMessage("Vui lòng điền đầy đủ thông tin.", "danger");
            return;
          }

          if (password.length < 6) {
            showMessage("Mật khẩu phải có ít nhất 6 ký tự.", "danger");
            return;
          }

          const submitBtn = this.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.textContent = "Đang đăng ký...";

          try {
            const res = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, email, password }),
            });

            if (!res.ok) {
              const error = await res.json();
              showMessage(
                error.message || "Đăng ký thất bại. Vui lòng thử lại.",
                "danger",
              );
              return;
            }

            showMessage(
              "Đăng ký thành công! Chuyển sang trang đăng nhập...",
              "success",
            );
            setTimeout(() => {
              window.location.href = "/login";
            }, 1200);
          } catch (err) {
            console.error(err);
            showMessage("Lỗi kết nối server. Vui lòng thử lại sau.", "danger");
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Đăng Ký";
          }
        });

      function showMessage(text, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.innerHTML = text;
        messageDiv.className = `alert alert-${type} mt-3`;
        messageDiv.classList.remove("d-none");
        setTimeout(() => messageDiv.classList.add("d-none"), 5000);
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
