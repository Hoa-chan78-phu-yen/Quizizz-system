<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - Online Quiz</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <header>
      <h1>Hệ Thống Trắc Nghiệm Trực Tuyến</h1>
      <nav>
        <a th:href="@{/}">Trang chủ</a>
      </nav>
    </header>

    <div class="form-container">
      <h2>Tạo Tài Khoản Mới</h2>
      <form>
        <div class="form-group">
          <label for="fullname">Họ và tên</label>
          <input type="text" id="fullname" placeholder="Nhập họ và tên..." />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Nhập email..." />
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="Tạo mật khẩu..." />
        </div>
        <button type="button" class="btn">Đăng Ký</button>
      </form>
      <p class="text-center">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
      </p>
    </div>
  </body>
</html>
