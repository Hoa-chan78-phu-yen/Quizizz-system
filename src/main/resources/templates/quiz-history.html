<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Lịch sử làm bài</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/quiz-history.css}" />
  </head>
  <body>
    <header class="bg-primary text-white py-3">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <h1 class="h4 mb-0">Hệ Thống Trắc Nghiệm Trực Tuyến</h1>
          <nav>
            <a th:href="@{/quizzes}" class="text-white text-decoration-none me-3">Danh sách bài thi</a>
            <a href="#" id="logoutBtn" class="text-white text-decoration-none" data-auth="logout">Đăng xuất</a>
          </nav>
        </div>
      </div>
    </header>

    <div class="container mt-5">
      <h2 class="mb-4">Lịch sử làm bài trắc nghiệm</h2>

      <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered">
          <thead class="table-dark">
            <tr>
              <th scope="col">#</th>
              <th scope="col">Tên bài kiểm tra</th>
              <th scope="col">Ngày làm bài</th>
              <th scope="col">Số câu đúng</th>
              <th scope="col">Điểm số</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(histories)}">
              <td colspan="5" class="text-center">
                Bạn chưa làm bài quiz nào.
              </td>
            </tr>

            <tr th:each="history, stat : ${histories}">
              <th scope="row" th:text="${stat.count}">1</th>
              <td th:text="${history.quizTitle}">Bài kiểm tra Java</td>
              <td
                th:text="${#temporals.format(history.submitTime, 'dd-MM-yyyy HH:mm')}"
              >
                25-10-2023 14:30
              </td>
              <td>
                <span th:text="${history.correctAnswers}"></span> /
                <span th:text="${history.totalQuestions}"></span>
              </td>
              <td>
                <span
                  class="badge bg-primary"
                  th:text="${history.score}"
                ></span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="mt-3">
        <a th:href="@{/quizzes}" class="btn btn-secondary"
          >&larr; Quay lại danh sách Quiz</a
        >
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
