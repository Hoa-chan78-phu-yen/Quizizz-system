<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang Chủ - Online Quiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__inner">
        <a th:href="@{/index}" class="app-logo">
          <span class="app-logo__mark">Q</span>
          <span>Quiz</span>
        </a>
        <nav class="app-nav">
          <a th:href="@{/index}" class="is-active">Trang chủ</a>
          <a th:href="@{/quiz}">Danh sách bài thi</a>
          <a th:href="@{/activity}">Hoạt động</a>
          <a th:href="@{/history}">Lịch sử</a>
          <a th:href="@{/login}" data-auth="login">Đăng nhập</a>
          <a th:href="@{/register}" data-auth="login">Đăng ký</a>
          <a href="#" id="logoutBtn" data-auth="logout" style="display: none">Đăng xuất</a>
        </nav>
      </div>
    </header>

    <main class="app-main page-stack">
      <div class="hero-panel">
        <div class="button-row" style="margin-top: 28px">
          <a th:href="@{/quiz}" class="btn btn-primary btn-lg">Khám phá bài thi</a>
          <a th:href="@{/join}" class="btn btn-outline-secondary btn-lg">Vào bằng mã PIN</a>
          <a th:href="@{/activity}" class="btn btn-secondary btn-lg">Trang activity</a>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
