<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Làm Bài Thi - Online Quiz</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__inner">
        <a th:href="@{/index}" class="app-logo">
          <span class="app-logo__mark">Q</span>
          <span>Quiz</span>
        </a>
        <nav class="app-nav">
          <a th:href="@{/quiz}">Thoát bài thi</a>
        </nav>
      </div>
    </header>

    <main class="app-main page-stack">
      <section class="surface-card">
        <div class="action-bar">
          <div>
            <h1 class="section-title" th:text="${quizTitle}">
              Lập trình Java Cơ Bản
            </h1>
            <p class="section-copy">
              Chọn một đáp án cho mỗi câu hỏi rồi nộp bài khi hoàn tất.
            </p>
          </div>
          <div class="timer-pill">
            <span>Thời gian</span>
            <span id="timeDisplay">15:00</span>
          </div>
        </div>

        <form
          id="quizForm"
          th:action="@{/quiz/{id}/submit(id=${quizId})}"
          method="post"
          class="page-stack"
        >
          <input type="hidden" id="quizId" name="quizId" th:value="${quizId}" />

          <section
            class="question-panel"
            th:each="question, stat : ${questions}"
          >
            <h2
              style="font-size: 1.3rem; margin-bottom: 16px"
              th:text="'Câu ' + ${stat.count} + ': ' + ${question.content}"
            >
              Câu 1
            </h2>

            <ul class="option-list">
              <li th:each="answer : ${question.answers}">
                <label class="option-label">
                  <input
                    type="radio"
                    th:name="'answers[' + ${question.questionId} + ']'"
                    th:value="${answer.answerId}"
                    required
                  />
                  <span th:text="${answer.content}">A. extends</span>
                </label>
              </li>
            </ul>
          </section>

          <div class="button-row">
            <button type="submit" class="btn btn-success btn-lg btn-block">
              Nộp bài
            </button>
          </div>
        </form>
      </section>
    </main>

    <script th:inline="javascript">
      let timeLimitMinutes = [[${timeLimit}]];
      if (!timeLimitMinutes) timeLimitMinutes = 15;
      let timeInSeconds = timeLimitMinutes * 60;
      const timeDisplay = document.getElementById("timeDisplay");
      const quizForm = document.getElementById("quizForm");

      const timerInterval = setInterval(() => {
        if (timeInSeconds <= 0) {
          clearInterval(timerInterval);
          alert("Hết giờ! Hệ thống sẽ tự động nộp bài.");
          quizForm.submit();
        } else {
          timeInSeconds--;
          const minutes = Math.floor(timeInSeconds / 60);
          const seconds = timeInSeconds % 60;
          timeDisplay.textContent =
            (minutes < 10 ? "0" : "") +
            minutes +
            ":" +
            (seconds < 10 ? "0" : "") +
            seconds;
        }
      }, 1000);
    </script>
  </body>
</html>
