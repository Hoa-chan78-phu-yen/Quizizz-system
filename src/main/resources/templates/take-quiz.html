<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${quiz.title}">Làm bài Quiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/take-quiz.css}" />
  </head>
  <body>
    <header class="bg-primary text-white py-3">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <h1 class="h4 mb-0">Hệ Thống Trắc Nghiệm Trực Tuyến</h1>
          <nav>
            <a th:href="@{/quizzes}" class="text-white text-decoration-none me-3">Danh sách bài thi</a>
            <a href="#" id="logoutBtn" class="text-white text-decoration-none" data-auth="logout">Đăng xuất</a>
          </nav>
        </div>
      </div>
    </header>

    <div class="container mt-5 mb-5">
      <h2 class="mb-4 text-center" th:text="${quiz.title}">
        Tên Bài Trắc Nghiệm
      </h2>

      <form th:action="@{/quiz/{id}/submit(id=${quiz.id})}" method="post">
        <div
          class="card mb-4 shadow-sm"
          th:each="question, stat : ${quiz.questions}"
        >
          <div class="card-header bg-light">
            <strong>Câu <span th:text="${stat.count}">1</span>:</strong>
            <span th:text="${question.content}">Nội dung câu hỏi ở đây?</span>
          </div>
          <div class="card-body">
            <div class="form-check" th:each="answer : ${question.answers}">
              <input
                class="form-check-input"
                type="radio"
                th:name="'userAnswers[' + ${question.id} + ']'"
                th:value="${answer.id}"
                th:id="'answer_' + ${answer.id}"
                required
              />
              <label
                class="form-check-label"
                th:for="'answer_' + ${answer.id}"
                th:text="${answer.content}"
              >
                Nội dung đáp án
              </label>
            </div>
          </div>
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-success btn-lg px-5">
            Nộp bài
          </button>
          <a
            th:href="@{/quizzes}"
            class="btn btn-danger btn-lg px-5 ml-2"
            onclick="
              return confirm(
                'Bạn có chắc chắn muốn thoát? Dữ liệu đang làm sẽ không được lưu.',
              );
            "
            >Thoát</a
          >
        </div>
      </form>
    </div>
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
