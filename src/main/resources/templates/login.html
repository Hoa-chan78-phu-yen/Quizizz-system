<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Online Quiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__inner">
        <a th:href="@{/index}" class="app-logo">
          <span class="app-logo__mark">Q</span>
          <span>Quiz</span>
        </a>
        <nav class="app-nav">
          <a th:href="@{/index}">Trang chủ</a>
          <a th:href="@{/register}">Đăng ký</a>
        </nav>
      </div>
    </header>

    <main class="app-main auth-layout">
      <section class="auth-card login-container">
        <h1 class="auth-title">Đăng nhập</h1>
        <p class="auth-copy">
          Truy cập danh sách bài thi, lịch sử làm bài và kết quả của bạn.
        </p>

        <div id="message" class="d-none"></div>

        <form id="loginForm" class="form-stack">
          <div>
            <label for="email" class="form-label">Email tài khoản</label>
            <input
              type="text"
              class="form-control"
              id="email"
              placeholder="Nhập email..."
              required
            />
          </div>

          <div>
            <label for="password" class="form-label">Mật khẩu</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Nhập mật khẩu..."
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-login btn-block">
            Đăng nhập
          </button>
        </form>

        <p class="text-center mt-3 form-note">
          Chưa có tài khoản?
          <a th:href="@{/register}" class="text-decoration-none"
            >Đăng ký ngay</a
          >
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          if (!email || !password) {
            showMessage("Vui lòng nhập đầy đủ thông tin!", "error");
            return;
          }

          const submitBtn = document.querySelector(".btn-login");
          submitBtn.disabled = true;
          submitBtn.textContent = "Đang đăng nhập...";

          try {
            const res = await fetch("/api/auth/login", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                email: email,
                password: password,
              }),
            });

            if (!res.ok) {
              const errorData = await res.json();
              showMessage(
                errorData.message || "Sai tài khoản hoặc mật khẩu!",
                "error",
              );
              return;
            }

            const data = await res.json();
            localStorage.setItem("token", data.token);

            showMessage(
              "Đăng nhập thành công! Đang chuyển hướng...",
              "success",
            );

            setTimeout(() => {
              window.location.href = "/index";
            }, 1000);
          } catch (err) {
            console.error(err);
            showMessage("Lỗi kết nối server! Vui lòng thử lại.", "error");
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Đăng nhập";
          }
        });

      function showMessage(text, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.className = `alert alert-${type === "error" ? "danger" : "success"} mt-3`;
        messageDiv.textContent = text;
        messageDiv.classList.remove("d-none");
        setTimeout(() => messageDiv.classList.add("d-none"), 5000);
      }
    </script>
    <script th:src="@{/js/auth.js}"></script>
  </body>
</html>
